name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Dependencies (damascene-core / damascene-winit-wgpu) are consumed from
# crates.io and pinned in the committed Cargo.lock, so all cargo invocations
# use --locked to fail on lockfile drift.

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # wgpu/winit pull in vulkan + wayland/xkb + dbus on Linux; the
      # pipewire crate needs libpipewire-0.3-dev for its bindgen build.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev libpipewire-0.3-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libwayland-dev libxkbcommon-dev libdbus-1-dev libpipewire-0.3-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-targets --locked
      - name: Run library tests
        run: cargo test --lib --locked
