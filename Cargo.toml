[package]
name = "aetna-volume"
version = "0.1.0"
edition = "2024"
default-run = "aetna-volume"

[dependencies]
aetna-core = { path = "../aetna/aetna.main/crates/aetna-core" }
aetna-winit-wgpu = { path = "../aetna/aetna.main/crates/aetna-winit-wgpu" }
anyhow = "1"
pipewire = "0.9.2"
rustix = { version = "1.1", features = ["process"] }
serde = { version = "1", features = ["derive"] }
